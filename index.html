<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Alto Garda Scan</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="ag-scan-180.png">
  <meta name="theme-color" content="#0b1220" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <img class="logo" src="ag-scan-180.png" alt="logo">
    <div class="title">
      <h1>Alto Garda Scan</h1>
      <p>Foto → auto-crop → PDF</p>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="row">
        <span class="badge" id="stepBadge">Pagina 1 di 4</span>
        <button class="btn ghost" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="row gap top-controls">
        <label class="field">
          <span>N° pagine</span>
          <input id="pagesInput" type="number" min="1" max="20" value="4" inputmode="numeric" />
        </label>

        <label class="toggle">
          <input id="autocropToggle" type="checkbox" checked />
          <span>Auto-crop & correzione</span>
        </label>
      </div>

      <div class="camera">
        <video id="video" playsinline autoplay></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>

      <div class="row gap">
        <button class="btn" id="snapBtn" type="button">Scatta</button>
        <button class="btn ghost" id="switchBtn" type="button">Cambia camera</button>
      </div>

      <div class="divider"></div>

      <div id="thumbs" class="thumbs"></div>

      <div class="row gap">
        <button class="btn primary" id="pdfBtn" type="button" disabled>Genera PDF</button>
        <a class="btn ghost" id="downloadLink" download hidden>Scarica PDF</a>
      </div>

      <div class="hint" id="hint"></div>

      <!-- Fallback input (camera nativa) -->
      <input id="fileFallback" class="hidden" type="file" accept="image/*" capture="environment" />
      <button class="btn ghost hidden" id="fallbackBtn" type="button">Apri fotocamera (fallback)</button>
    </section>
  </main>

  <!-- PDF -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- EXIF orientation -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <!-- OpenCV (auto-crop + prospettiva) -->
  <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
