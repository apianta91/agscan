<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Alto Garda Scan</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="ag-scan-180.png">
  <meta name="theme-color" content="#070b16" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <img class="logo" src="ag-scan-180.png" alt="logo">
    <div class="title">
      <h1>Alto Garda Scan</h1>
      <p>Auto-crop → PDF pronto</p>
    </div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="status-row">
        <div class="status">
          <div class="statusTitle" id="stepTitle">Pagina 1</div>
          <div class="statusSub" id="stepSub">di 4</div>
        </div>

        <label class="toggle">
          <input id="autocropToggle" type="checkbox" checked />
          <span>Auto-crop</span>
        </label>

        <button class="btn danger" id="resetBtn" type="button">Reset</button>
      </div>

      <div class="camera">
        <video id="video" playsinline autoplay></video>
        <canvas id="canvas" class="hidden"></canvas>
      </div>

      <div class="thumbs" id="thumbs"></div>

      <div class="hint" id="hint"></div>
    </section>
  </main>

  <!-- Bottom controls (sticky) -->
  <nav class="bottomBar">
    <div class="pagePicker">
      <button class="chip" id="minusBtn" type="button" aria-label="Meno pagine">−</button>
      <div class="pageCount">
        <div class="pageCountNum" id="pagesNum">4</div>
        <div class="pageCountLbl">pagine</div>
      </div>
      <button class="chip" id="plusBtn" type="button" aria-label="Più pagine">+</button>
    </div>

    <div class="actions">
      <button class="btn big" id="snapBtn" type="button">Scatta</button>
      <button class="btn big ghost" id="switchBtn" type="button">Camera</button>
      <button class="btn big primary" id="pdfBtn" type="button" disabled>PDF</button>
      <a class="btn big ghost" id="downloadLink" download hidden>Scarica</a>
    </div>
  </nav>

  <!-- Fallback input (camera nativa) -->
  <input id="fileFallback" class="hidden" type="file" accept="image/*" capture="environment" />
  <button class="btn ghost fallback hidden" id="fallbackBtn" type="button">Apri fotocamera (fallback)</button>

  <!-- PDF -->
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <!-- EXIF orientation -->
  <script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
  <!-- OpenCV (auto-crop + prospettiva) -->
  <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
  </script>
</body>
</html>
